name: MSBuild

on:
  push:
    branches: [main]
  pull_request:
    branches: [ "main", "release/*" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      SOLUTION_FILE_PATH: .
      BUILD_CONFIGURATION: Debug
      # VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-binary-cache
      VCPKG_DEFAULT_BINARY_CACHE: .\vcpkg_installed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create vcpkg binary cache directory
        run: New-Item -ItemType Directory -Force "$env:VCPKG_DEFAULT_BINARY_CACHE"
        shell: pwsh

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Create vcpkg baseline
        run: vcpkg x-update-baseline --add-initial-baseline
        shell: pwsh

      - name: Install dependencies via vcpkg
        run: vcpkg install --triplet x64-windows-release
        shell: pwsh

      # ── 5. Patch BSGamePath & build ───────────────────────────────────────
      - name: Set BSGamePath in project file
        shell: pwsh
        run: |
          $proj = "BloodstainedModdingSDK.vcxproj"
          (Get-Content $proj) `
            -replace '<BSGamePath>.*?</BSGamePath>', "<BSGamePath>${{ env.SOLUTION_FILE_PATH }}</BSGamePath>" |
            Set-Content $proj

      - name: Build solution (Debug x64)
        run: >
          msbuild BloodstainedModdingSDK.vcxproj
          /p:Configuration=${{ env.BUILD_CONFIGURATION }}
          /p:Platform=x64
          /m
        shell: pwsh

